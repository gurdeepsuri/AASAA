<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — AASAA</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/assets/mark.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .nf-wrap { min-height: 100vh; display: grid; place-items: center; text-align: center;
      padding: 2rem; background:
        radial-gradient(circle at 80% 15%, rgba(163,188,190,0.25), transparent 45%),
        radial-gradient(circle at 15% 85%, rgba(243,167,47,0.15), transparent 40%), var(--paper); }
    .nf-inner { max-width: 32rem; }
    .nf-mark { width: 96px; margin: 0 auto 1.6rem; }
    .nf-code { font-family: var(--font-display); font-size: clamp(3rem,10vw,5rem); color: var(--maroon); line-height: 1; }
    .nf-wrap h1 { font-size: clamp(1.4rem,4vw,2rem); margin: 0.6rem 0 1rem; }
    .nf-wrap p { color: var(--ink-soft); margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="nf-wrap">
    <div class="nf-inner">
      <img class="nf-mark" src="/assets/mark.svg" alt="AASAA logo mark">
      <div class="nf-code">404</div>
      <h1>This page has wandered off.</h1>
      <p>The page you're looking for doesn't exist or has moved. Let's get you back home.</p>
      <a class="btn btn-primary" href="/">Back to AASAA</a>
    </div>
  </div>
</body>
</html>
